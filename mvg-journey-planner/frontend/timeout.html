<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Session Timed Out</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .container {
            text-align: center;
            padding: 60px;
        }
        
        .icon {
            font-size: 8rem;
            margin-bottom: 30px;
        }
        
        .title {
            font-size: 3.5rem;
            color: #f39c12;
            margin-bottom: 20px;
        }
        
        .subtitle {
            font-size: 1.8rem;
            color: #888;
            max-width: 600px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⏰</div>
        <h1 class="title">Session Timed Out</h1>
        <p class="subtitle">You were inactive for too long. Please start a new session.</p>
    </div>
</body>
</html>
